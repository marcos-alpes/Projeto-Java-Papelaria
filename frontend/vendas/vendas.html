<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC Papelaria - Vendas</title>
    <link rel="stylesheet" href="vendas.css">
</head>
<body>

<div class="container">
    <h1>SGC Papelaria</h1>
    <h2>Registrar Venda</h2>

    <!-- Formulário de nova venda -->
    <form onsubmit="return false;">
        <input type="number" id="clienteId" placeholder="ID do Cliente" min="1">
        <input type="number" id="usuarioId" placeholder="ID do Usuário Responsável" min="1">

        <h2>Itens da Venda</h2>

        <div style="display: flex; gap: 10px;">
            <input type="number" id="produtoId" placeholder="ID do Produto" min="1">
            <input type="number" id="quantidade" placeholder="Quantidade" min="1">
        </div>

        <button type="button" class="btn-adicionar" onclick="adicionarItem()">+ Adicionar Item</button>
    </form>

    <!-- Lista de itens adicionados -->
    <div id="listaItens"></div>

    <!-- Total -->
    <div class="total-box">
        <strong>Total: R$ <span id="totalVenda">0,00</span></strong>
    </div>

    <button class="btn-registrar" onclick="registrarVenda()">✅ Registrar Venda</button>

    <div id="mensagem"></div>

    <hr style="margin: 30px 0;">

    <!-- Tabela de vendas -->
    <h2>Vendas Registradas</h2>
    <button onclick="carregarVendas()" style="background-color:#2d89ef; color:white; margin-bottom:16px;">
        🔄 Atualizar Lista
    </button>

    <div id="tabelaVendas"></div>
</div>

<script src="vendas.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC Papelaria - Relatórios</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="relatorios.css">
</head>
<body>

<div class="container">
    <h1>SGC Papelaria</h1>
    <h2>Relatórios de Vendas</h2>

    <!-- Relatório por Período -->
    <div class="secao">
        <h2>Vendas por Período</h2>
        <form onsubmit="return false;">
            <input type="date" id="dataInicio">
            <input type="date" id="dataFim">
            <button type="button" onclick="buscarPorPeriodo()">🔍 Buscar</button>
        </form>
        <div id="resultadoPeriodo"></div>
    </div>

    <!-- Relatório por Cliente -->
    <div class="secao">
        <h2>Vendas por Cliente</h2>
        <form onsubmit="return false;">
            <input type="number" id="clienteIdRelatorio" placeholder="ID do Cliente" min="1">
            <button type="button" onclick="buscarPorCliente()">🔍 Buscar</button>
        </form>
        <div id="resultadoCliente"></div>
    </div>

    <!-- Gráfico Anual -->
    <div class="secao">
        <h2>Gráfico de Vendas Anuais</h2>
        <form onsubmit="return false;">
            <input type="number" id="anoGrafico" placeholder="Ano (ex: 2025)" min="2020" max="2099">
            <button type="button" onclick="carregarGrafico()">📈 Gerar Gráfico</button>
        </form>
        <div class="grafico-container">
            <canvas id="graficoVendas"></canvas>
        </div>
    </div>
</div>

<script src="relatorios.js"></script>
</body>
</html>
